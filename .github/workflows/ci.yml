name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Supply-chain audit: advisories, license policy, banned crates, sources.
      # Config + accepted-advisory rationale live in deny.toml (audit L4).
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  interop:
    name: cross-language interop (Rust <-> TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Byte-for-byte check: a Signet (Rust) blind signature must verify under the
      # exact @cloudflare/blindrsa-ts FreedInk uses, and cross-version / metadata
      # mismatches must be rejected. Builds the interop_tool example, installs the
      # pinned TS lib, and runs the driver; prints INTEROP OK on success.
      - name: Run blind-RSA interop harness
        run: bash interop/run.sh
      # VOPRF suite decision gate (ADR Phase 2 item 6): TS (@cloudflare/voprf-ts
      # + noble) blind -> Rust evaluate + DLEQ -> TS finalize (DLEQ verified
      # against the pinned pkS) -> byte-compare against the frozen ecosystem
      # vectors; tampered-proof and wrong-key evaluations must be rejected.
      # Red here means flip the ciphersuite to P256-SHA256 before anything
      # depends on values. Prints PRF INTEROP OK on success.
      - name: Run PRF (VOPRF) interop harness
        run: bash interop/run-prf.sh
